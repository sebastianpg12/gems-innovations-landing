<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="url(#gradient1)"/>
  
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007bff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#64b5f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0056b3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Phone illustration -->
  <rect x="150" y="50" width="100" height="160" rx="15" fill="rgba(0, 0, 0, 0.1)"/>
  <rect x="155" y="55" width="90" height="150" rx="10" fill="url(#gradient2)"/>
  
  <!-- Screen content -->
  <rect x="160" y="65" width="80" height="8" rx="4" fill="#007bff"/>
  <rect x="160" y="80" width="60" height="6" rx="3" fill="#e5e5e5"/>
  <rect x="160" y="90" width="70" height="6" rx="3" fill="#e5e5e5"/>
  
  <!-- Message bubbles -->
  <rect x="165" y="105" width="45" height="15" rx="8" fill="#e5e5e5"/>
  <rect x="175" y="125" width="35" height="15" rx="8" fill="#64b5f6"/>
  <rect x="165" y="145" width="50" height="15" rx="8" fill="#e5e5e5"/>
  
  <!-- Bot icon -->
  <circle cx="320" cy="150" r="40" fill="#007bff"/>
  <circle cx="310" cy="140" r="6" fill="#fff"/>
  <circle cx="330" cy="140" r="6" fill="#fff"/>
  <rect x="305" y="155" width="30" height="8" rx="4" fill="#fff"/>
  
  <!-- WhatsApp logo styled -->
  <circle cx="80" cy="150" r="35" fill="#fff"/>
  <circle cx="80" cy="150" r="25" fill="#64b5f6"/>
  <circle cx="75" cy="145" r="3" fill="#fff"/>
  <circle cx="85" cy="145" r="3" fill="#fff"/>
  <path d="M 75 155 Q 80 160, 85 155" stroke="#fff" stroke-width="2" fill="none"/>
  
  <!-- Title -->
  <text x="200" y="40" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Sales Assistant Bot</text>
  <text x="200" y="270" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="14">WhatsApp + IA = Ventas 24/7</text>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="80" r="3" fill="rgba(255, 255, 255, 0.3)"/>
  <circle cx="350" cy="100" r="2" fill="rgba(255, 255, 255, 0.4)"/>
  <circle cx="370" cy="250" r="4" fill="rgba(255, 255, 255, 0.2)"/>
  <circle cx="30" cy="220" r="2" fill="rgba(255, 255, 255, 0.3)"/>
</svg>
